syntax = "proto3";

package com.factoryx.catalog.grpc;

option java_multiple_files = true;
option java_package = "com.factoryx.catalog.grpc";
option java_outer_classname = "CatalogProto";

service InternalCatalogService {
  rpc GetProductPrice (PriceRequest) returns (PriceResponse);
}

message PriceRequest {
  string sku = 1;
}

message PriceResponse {
  string sku = 1;
  double price = 2;
  bool exists = 3;
}
