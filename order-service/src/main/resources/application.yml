server:
  port: 8082

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/factoryx
    username: factory
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

grpc:
  client:
    catalog-service:
      address: static://localhost:9090
      negotiation-type: plaintext
