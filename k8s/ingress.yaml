apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: factory-x-ingress
  namespace: factory-x
  annotations:
    kubernetes.io/ingress.class: gce
spec:
  rules:
    - http:
        paths:
          - path: /api/v1/catalog
            pathType: Prefix
            backend:
              service:
                name: catalog-service
                port:
                  number: 8081
          - path: /api/v1/orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 8082
          - path: /api/v1/inventory
            pathType: Prefix
            backend:
              service:
                name: inventory-service
                port:
                  number: 8083
          - path: /api/v1/ai
            pathType: Prefix
            backend:
              service:
                name: ai-assistant-service
                port:
                  number: 8084
