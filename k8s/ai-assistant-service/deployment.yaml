apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-assistant-service
  namespace: factory-x
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-assistant-service
  template:
    metadata:
      labels:
        app: ai-assistant-service
    spec:
      containers:
        - name: ai-assistant-service
          image: gcr.io/factory-x/ai-assistant-service:latest
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/factoryx
            - name: SPRING_DATASOURCE_USERNAME
              value: factory
            - name: SPRING_DATASOURCE_PASSWORD
              value: password
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: openai-api-key
---
apiVersion: v1
kind: Service
metadata:
  name: ai-assistant-service
  namespace: factory-x
spec:
  selector:
    app: ai-assistant-service
  ports:
    - port: 8084
      targetPort: 8084
      name: http
