apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: factory-x
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: gcr.io/factory-x/inventory-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/factoryx
            - name: SPRING_DATASOURCE_USERNAME
              value: factory
            - name: SPRING_DATASOURCE_PASSWORD
              value: password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: factory-x
spec:
  selector:
    app: inventory-service
  ports:
    - port: 8083
      targetPort: 8083
      name: http
